name: butter-backup

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        dependency-extras: ["", "--extra all"]

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv sync --package butter-backup ${{ matrix.dependency-extras }}
          sudo apt install e2fsprogs restic
      - name: Check formatting with ruff
        run: uv run --package butter-backup ruff format --check projects/butter-backup
      - name: Check import ordering with ruff
        run: uv run --package butter-backup ruff check --output-format=github --select I projects/butter-backup
      - name: Check static typing with mypy
        run: uv run --package butter-backup mypy projects/butter-backup
      - name: Lint with ruff
        run: uv run --package butter-backup ruff check --output-format=github projects/butter-backup
      - name: Test with pytest
        run: uv run --package butter-backup pytest --junitxml=junit/test-results.xml --cov-report=xml --cov-report=html
        working-directory: projects/butter-backup

  check:
    if: always()
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
