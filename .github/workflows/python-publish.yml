name: Upload Python Packages

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-butter-backup:
    if: startsWith(github.ref, 'refs/tags/butter-backup-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Build package
        run: uv build --package butter-backup
      - uses: actions/upload-artifact@v4
        with:
          name: dist-butter-backup
          path: dist/

  build-storage-device-managers:
    if: startsWith(github.ref, 'refs/tags/storage-device-managers-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Build package
        run: uv build --package storage-device-managers
      - uses: actions/upload-artifact@v4
        with:
          name: dist-storage-device-managers
          path: dist/

  build-shell-interface:
    if: startsWith(github.ref, 'refs/tags/shell-interface-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Build package
        run: uv build --package shell-interface
      - uses: actions/upload-artifact@v4
        with:
          name: dist-shell-interface
          path: dist/

  pypi-publish-butter-backup:
    name: Upload butter-backup to PyPI
    needs: [build-butter-backup]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-butter-backup
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  pypi-publish-storage-device-managers:
    name: Upload storage-device-managers to PyPI
    needs: [build-storage-device-managers]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-storage-device-managers
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  pypi-publish-shell-interface:
    name: Upload shell-interface to PyPI
    needs: [build-shell-interface]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-shell-interface
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
